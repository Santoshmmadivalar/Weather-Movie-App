<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & Movie App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>


<h1>🌦️ Weather App + 🎬 Movie Search</h1>


<div class="container">


<!-- Weather Section -->

<div class="card">

<h2>🌦️ Weather App</h2>

<input 
type="text" 
id="city"
placeholder="Enter city name">

<button onclick="getWeather()">
Search Weather
</button>


<div id="weatherResult">

</div>


</div>



<!-- Movie Section -->

<div class="card">

<h2>🎬 Movie Search</h2>


<input 
type="text" 
id="movie"
placeholder="Enter movie name">


<button onclick="searchMovie()">
Search Movie
</button>


<div id="movieResult">

</div>


</div>


</div>



<script src="script.js"></script>

</body>

</html>
